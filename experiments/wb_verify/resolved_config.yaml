model:
  vocab_size: 32000
  hidden_size: 384
  num_hidden_layers: 8
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 512
  type_vocab_size: 2
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  layer_norm_eps: 1.0e-12
  hidden_act: gelu
  norm_type: post
  tie_word_embeddings: true
  use_sdpa: false
  pad_token_id: 0
  initializer_range: 0.02
train:
  seed: 42
  precision: fp32
  learning_rate: 0.0001
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-08
  max_grad_norm: 1.0
  warmup_steps: 4
  max_steps: 6
  lr_scheduler: cosine
  min_lr_ratio: 0.1
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  max_seq_length: 32
  mlm_probability: 0.15
  eval_every: 3
  save_every: 1000
  eval_max_batches: 4
  log_every: 5
data:
  dataset_name: null
  dataset_config: null
  text_column: text
  tokenizer_path: null
  synthetic:
    num_train_examples: 256
    num_val_examples: 64
    min_len: 24
    max_len: 32
output:
  dir: experiments/wb_verify
  checkpoint_dir: experiments/wb_verify/checkpoints
runtime:
  device: auto
  allow_tf32: false
  pin_memory: false
  num_workers: 0
  persistent_workers: false
  non_blocking: false
  fused_adamw: false
  torch_compile: false
  compile_mode: default
tracking:
  backend: wandb
  mode: offline
  project: bert-cord-verify
  entity: null
  run_name: null
  group: null
  job_type: training
  tags: []
  notes: null
  log_interval: 10
  log_code: false
  log_checkpoints: false
  log_analysis_artifacts: true
