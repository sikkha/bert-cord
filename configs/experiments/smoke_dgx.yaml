# Short synthetic smoke on DGX (portability profile: bf16/CUDA, SDPA off). Fast + self-contained.
extends:
  - ../model/bert_25m.yaml
  - ../platform/dgx_portability.yaml
train:
  max_steps: 40
  warmup_steps: 4
  eval_every: 10
  save_every: 1000
  eval_max_batches: 4
  log_every: 5
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  max_seq_length: 32
data:
  dataset_name: null
  synthetic:
    num_train_examples: 256
    num_val_examples: 64
    min_len: 24
    max_len: 32
output:
  dir: experiments/smoke_dgx
  checkpoint_dir: experiments/smoke_dgx/checkpoints
