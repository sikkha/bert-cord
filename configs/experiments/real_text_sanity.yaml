# Real-text sanity check. Requires a trained tokenizer (scripts/train_tokenizer.py) and the
# `train` extra (datasets). Kept small; verifies the HF text path end-to-end, not LM quality.
extends:
  - ../model/bert_25m.yaml
  - ../platform/mac_mps.yaml
train:
  max_steps: 200
  warmup_steps: 20
  eval_every: 50
  save_every: 100
  eval_max_batches: 10
  log_every: 20
  per_device_batch_size: 16
  gradient_accumulation_steps: 1
  max_seq_length: 128
data:
  # Fill these in to use a real corpus; leaving dataset_name null falls back to synthetic.
  dataset_name: wikitext          # e.g. wikitext
  dataset_config: wikitext-2-raw-v1
  text_column: text
  tokenizer_path: artifacts/tokenizer.json   # produced by scripts/train_tokenizer.py
output:
  dir: experiments/real_text_sanity
  checkpoint_dir: experiments/real_text_sanity/checkpoints
