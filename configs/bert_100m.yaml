# PROVISIONAL ~100M-parameter config. Do NOT run full training in Milestone 0.
# Provided so the architecture/config path is exercised at a larger tier later.

model:
  vocab_size: 32000
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 3072
  max_position_embeddings: 512
  type_vocab_size: 2
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  layer_norm_eps: 1.0e-12
  hidden_act: gelu
  norm_type: post
  tie_word_embeddings: true
  use_sdpa: false
  pad_token_id: 0

train:
  seed: 42
  precision: auto
  learning_rate: 1.0e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  warmup_steps: 1000
  max_steps: 100000
  lr_scheduler: cosine
  min_lr_ratio: 0.1
  per_device_batch_size: 32
  gradient_accumulation_steps: 8
  max_seq_length: 512
  mlm_probability: 0.15
  eval_every: 500
  save_every: 1000
  eval_max_batches: 50
  log_every: 50

data:
  dataset_name: null
  dataset_config: null
  text_column: text
  tokenizer_path: null
  synthetic:
    num_train_examples: 4096
    num_val_examples: 512
    min_len: 24
    max_len: 512

output:
  dir: experiments/run_100m
  checkpoint_dir: experiments/run_100m/checkpoints
