# WordPiece tokenizer (BERT-original style). Special tokens pinned to ids 0..4.
tokenizer:
  name: bert-cord-wordpiece-32k
  algorithm: wordpiece
  vocab_size: 32000
  min_frequency: 2
  normalization: NFC
  lowercase: false
  byte_fallback: false        # not applicable to WordPiece
  add_bert_postprocessor: true
  model_max_length: 512
  special_tokens: ["[PAD]", "[CLS]", "[SEP]", "[MASK]", "[UNK]"]
