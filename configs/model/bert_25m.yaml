# SCIENTIFIC model definition only (~27.01M actual params). Hardware/runtime settings live in
# configs/platform/*. Compose via `extends:` (see configs/bert_25m_*.yaml).
model:
  vocab_size: 32000
  hidden_size: 384
  num_hidden_layers: 8
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 512
  type_vocab_size: 2
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  layer_norm_eps: 1.0e-12
  hidden_act: gelu
  norm_type: post
  tie_word_embeddings: true
  use_sdpa: false          # attention impl; platform profiles may override
  pad_token_id: 0
