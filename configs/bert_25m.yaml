# ~25M-parameter micro BERT config (Milestone 0 baseline).
# Actual parameter count is computed and printed at startup and recorded in
# dev_mem/architecture_decisions.md (ADR-002). Names are targets, not guarantees.

model:
  vocab_size: 32000
  hidden_size: 384
  num_hidden_layers: 8
  num_attention_heads: 6
  intermediate_size: 1536
  max_position_embeddings: 512
  type_vocab_size: 2            # set to 0 to disable token-type embeddings
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  layer_norm_eps: 1.0e-12
  hidden_act: gelu
  norm_type: post               # "post" (BERT-original) or "pre"
  tie_word_embeddings: true
  use_sdpa: false               # false = explicit softmax attention (default, tested)
  pad_token_id: 0

train:
  seed: 42
  precision: auto               # auto | bf16 | fp16 | fp32  (auto -> bf16 if CUDA supports)
  learning_rate: 1.0e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  warmup_steps: 100
  max_steps: 2000
  lr_scheduler: cosine          # cosine | linear
  min_lr_ratio: 0.1
  per_device_batch_size: 16
  gradient_accumulation_steps: 2
  max_seq_length: 128
  mlm_probability: 0.15
  eval_every: 100
  save_every: 200
  eval_max_batches: 20
  log_every: 20

data:
  # Synthetic data is used when dataset_name is null (no network needed).
  dataset_name: null            # e.g. "wikitext" for real text
  dataset_config: null          # e.g. "wikitext-2-raw-v1"
  text_column: text
  tokenizer_path: null          # null -> a deterministic byte/whitespace fallback tokenizer
  synthetic:
    num_train_examples: 4096
    num_val_examples: 512
    min_len: 24
    max_len: 128

output:
  dir: experiments/run_25m
  checkpoint_dir: experiments/run_25m/checkpoints
